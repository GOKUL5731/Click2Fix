services:
  - type: web
    name: click2fix-backend
    runtime: node
    runtimeVersion: 20.11.1
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && node dist/server.js
    healthCheckPath: /health
    healthCheckTimeout: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        fromSecret: JWT_SECRET
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: DATABASE_URL
        fromSecret: DATABASE_URL
      - key: DIRECT_URL
        fromSecret: DIRECT_URL
      - key: REDIS_URL
        fromSecret: REDIS_URL
      - key: SUPABASE_URL
        fromSecret: SUPABASE_URL
      - key: SUPABASE_ANON_KEY
        fromSecret: SUPABASE_ANON_KEY
      - key: FIREBASE_PROJECT_ID
        value: click2fix-74b5d
      - key: FIREBASE_CLIENT_EMAIL
        fromSecret: FIREBASE_CLIENT_EMAIL
      - key: FIREBASE_PRIVATE_KEY
        fromSecret: FIREBASE_PRIVATE_KEY
      - key: FIREBASE_STORAGE_BUCKET
        value: click2fix-74b5d.firebasestorage.app
      - key: FIREBASE_DATABASE_URL
        value: https://click2fix-74b5d-default-rtdb.firebaseio.com
      - key: TWILIO_ACCOUNT_SID
        fromSecret: TWILIO_ACCOUNT_SID
      - key: TWILIO_AUTH_TOKEN
        fromSecret: TWILIO_AUTH_TOKEN
      - key: TWILIO_VERIFY_SERVICE_SID
        fromSecret: TWILIO_VERIFY_SERVICE_SID
      - key: CORS_ORIGINS
        value: https://click2fix-backend.onrender.com
    autoDeploy: true
    region: oregon
